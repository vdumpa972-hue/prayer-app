workflows:
  ios-capacitor-release:
    name: iOS Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - app-secrets
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vdumpa972.prayercompanion

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Apply iOS signing profiles
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build IPA
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true